name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: for f in src/*.js test/*.js; do node --check "$f"; done
      - name: Run tests
        run: node --test

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t borderless-pay:ci .
      - name: Smoke test container
        run: |
          docker run -d --name bp -p 4000:4000 \
            -e BP_ENV=production \
            -e BP_SIGNING_SECRET=ci-signing-secret-not-for-prod \
            -e BP_ENC_KEY=$(openssl rand -hex 32) \
            borderless-pay:ci
          sleep 3
          curl -fsS http://localhost:4000/api/health
          docker rm -f bp
